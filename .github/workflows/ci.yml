name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check license headers
        run: npm run check:license

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test
